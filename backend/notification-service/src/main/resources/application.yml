server:
  address: ${NOTIFICATION_SERVICE_HOST:127.0.0.1}
  port: ${NOTIFICATION_SERVICE_PORT:8795}

spring:
  application:
    name: beiming-notification-service
  datasource:
    url: ${NOTIFICATION_DB_URL:jdbc:postgresql://192.168.1.5:5432/beiming?sslmode=disable}
    username: ${NOTIFICATION_DB_USERNAME:beiming}
    password: ${NOTIFICATION_DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  flyway:
    baseline-on-migrate: true
    baseline-version: 0

beiming:
  frontend-origin: ${FRONTEND_ORIGIN:http://127.0.0.1:5173}
  services:
    auth-url: ${AUTH_SERVICE_URL:http://127.0.0.1:8792}
  internal:
    token: ${NOTIFICATION_INTERNAL_TOKEN:}
