server:
  port: 9000

spring:
  application:
    name: gateway-service
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
    gateway:
      discovery:
        locator:
          enabled: false
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
        - id: onboarding-service
          uri: lb://onboarding-service
          predicates:
            - Path=/api/onboarding/**
        - id: server-service
          uri: lb://server-service
          predicates:
            - Path=/api/server/**
        - id: guide-service
          uri: lb://guide-service
          predicates:
            - Path=/api/guide/**
        - id: communication-service
          uri: lb://communication-service
          predicates:
            - Path=/api/communication/**
        - id: exam-service
          uri: lb://exam-service
          predicates:
            - Path=/api/exam/**
        - id: whitelist-service
          uri: lb://whitelist-service
          predicates:
            - Path=/api/whitelist/**
        - id: attendance-service
          uri: lb://attendance-service
          predicates:
            - Path=/api/attendance/**
        - id: profile-service
          uri: lb://profile-service
          predicates:
            - Path=/api/profile/**
        - id: content-service
          uri: lb://content-service
          predicates:
            - Path=/api/content/**
        - id: moment-service
          uri: lb://moment-service
          predicates:
            - Path=/api/moment/**
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/notification/**
        - id: admin-service
          uri: lb://admin-service
          predicates:
            - Path=/api/admin/**

management:
  endpoints:
    web:
      exposure:
        include: health,info
