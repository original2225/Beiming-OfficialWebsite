server:
  address: ${AUTH_SERVICE_HOST:127.0.0.1}
  port: ${AUTH_SERVICE_PORT:8792}

spring:
  application:
    name: beiming-auth-service
  datasource:
    url: ${AUTH_DB_URL:jdbc:postgresql://192.168.1.5:5432/beiming?sslmode=disable}
    username: ${AUTH_DB_USERNAME:beiming}
    password: ${AUTH_DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  flyway:
    baseline-on-migrate: true
    baseline-version: 0

beiming:
  frontend-origin: ${FRONTEND_ORIGIN:http://127.0.0.1:5173}
  data-dir: ${BEIMING_DATA_DIR:../../data}
  session-ttl-hours: ${BEIMING_SESSION_TTL_HOURS:168}
  onedrive:
    client-id: ${ONEDRIVE_CLIENT_ID:}
    client-secret: ${ONEDRIVE_CLIENT_SECRET:}
    redirect-uri: ${ONEDRIVE_REDIRECT_URI:http://localhost:8787/api/cloud/onedrive/callback}
    tenant: ${ONEDRIVE_TENANT:common}
